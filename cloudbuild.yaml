timeout: 1800s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/carddroper-migration-database-url/versions/latest
      env: MIGRATION_DATABASE_URL

steps:
  # 1. Build backend image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
      - ./backend

  # 2. Push backend image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA

  # 3. Run alembic upgrade head against Cloud SQL via the Auth Proxy.
  # Runs AS the backend image so alembic + app code are already on PATH.
  # Downloads the proxy binary with Python (image has no wget/curl),
  # starts it as a background process, runs alembic, then kills the proxy.
  - id: migrate
    name: us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
    entrypoint: sh
    args:
      - -c
      - |
        python -c "import urllib.request; urllib.request.urlretrieve('https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.15.2/cloud-sql-proxy.linux.amd64', '/tmp/cloud-sql-proxy')"
        chmod +x /tmp/cloud-sql-proxy
        /tmp/cloud-sql-proxy carddroper-staging:us-west1:carddroper-staging-db --port=5432 &
        PROXY_PID=$!
        WAIT=0
        until python -c "import socket, sys; s = socket.socket(); s.settimeout(1); sys.exit(0 if s.connect_ex(('127.0.0.1', 5432)) == 0 else 1)" 2>/dev/null; do
          WAIT=$((WAIT + 1))
          if [ "$$WAIT" -ge 15 ]; then
            echo "ERROR: postgres proxy did not become ready within 15s" >&2
            kill $$PROXY_PID 2>/dev/null
            exit 1
          fi
          sleep 1
        done
        cd /app && DATABASE_URL="$$MIGRATION_DATABASE_URL" alembic upgrade head
        RESULT=$?
        kill $$PROXY_PID 2>/dev/null
        exit $$RESULT
    secretEnv:
      - MIGRATION_DATABASE_URL

  # 4. Deploy backend to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carddroper-backend
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
      - --region=us-west1
      - --service-account=carddroper-runtime@carddroper-staging.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:us-west1:carddroper-staging-db
      - --set-secrets=DATABASE_URL=carddroper-database-url:latest,JWT_SECRET=carddroper-jwt-secret:latest,SENDGRID_API_KEY=carddroper-sendgrid-api-key:latest,SENDGRID_TEMPLATE_VERIFY_EMAIL=carddroper-sendgrid-template-verify-email:latest,SENDGRID_TEMPLATE_RESET_PASSWORD=carddroper-sendgrid-template-reset-password:latest,SENDGRID_TEMPLATE_CHANGE_EMAIL=carddroper-sendgrid-template-change-email:latest,SENDGRID_TEMPLATE_EMAIL_CHANGED=carddroper-sendgrid-template-email-changed:latest,SENDGRID_TEMPLATE_CREDITS_PURCHASED=carddroper-sendgrid-template-credits-purchased:latest,STRIPE_SECRET_KEY=carddroper-stripe-secret-key:latest,STRIPE_WEBHOOK_SECRET=carddroper-stripe-webhook-secret:latest
      - --set-env-vars=SENDGRID_SANDBOX=false,FROM_EMAIL=noreply@carddroper.com,FROM_NAME=Carddroper,FRONTEND_BASE_URL=https://staging.carddroper.com,CORS_ORIGINS=https://staging.carddroper.com,COOKIE_DOMAIN=.staging.carddroper.com,BILLING_ENABLED=true,BILLING_SUBSCRIPTION_GRANTS_TO_LEDGER=true,BILLING_REQUIRE_VERIFIED=false,BILLING_PORTAL_CONFIGURATION_ID=
      - --min-instances=0
      - --max-instances=3
      - --allow-unauthenticated
      - --port=8000

  # 5. Build frontend image with baked-in custom-domain API URL
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_API_BASE_URL=https://api.staging.carddroper.com
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$_STRIPE_PUBLISHABLE_KEY
      - -t
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA
      - ./frontend

  # 6. Push frontend image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA

  # 7. Deploy frontend to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carddroper-frontend
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA
      - --region=us-west1
      - --service-account=carddroper-frontend-runtime@carddroper-staging.iam.gserviceaccount.com
      - --min-instances=0
      - --max-instances=3
      - --allow-unauthenticated
      - --port=3000

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
  - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA
