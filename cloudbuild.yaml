timeout: 1800s

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/carddroper-migration-database-url/versions/latest
      env: DATABASE_URL

steps:
  # 1. Build backend image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
      - ./backend

  # 2. Push backend image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA

  # 3. Run alembic upgrade head against Cloud SQL via proxy
  - name: gcr.io/google-appengine/exec-wrapper
    args:
      - -i
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
      - -s
      - carddroper-staging:us-west1:carddroper-staging-db
      - -e
      - DATABASE_URL=$$DATABASE_URL
      - --
      - alembic
      - upgrade
      - head
    secretEnv:
      - DATABASE_URL

  # 4. Deploy backend to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carddroper-backend
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
      - --region=us-west1
      - --service-account=carddroper-runtime@carddroper-staging.iam.gserviceaccount.com
      - --add-cloudsql-instances=$PROJECT_ID:us-west1:carddroper-staging-db
      - --set-secrets=DATABASE_URL=carddroper-database-url:latest,JWT_SECRET=carddroper-jwt-secret:latest
      - --min-instances=0
      - --max-instances=3
      - --allow-unauthenticated
      - --port=8000

  # 5. Capture backend URL for frontend build arg
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services describe carddroper-backend \
          --region=us-west1 \
          --format='value(status.url)' \
          > /workspace/backend_url.txt

  # 6. Build frontend image with baked-in API URL
  - name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        docker build \
          --build-arg NEXT_PUBLIC_API_BASE_URL=$(cat /workspace/backend_url.txt) \
          -t us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA \
          ./frontend

  # 7. Push frontend image
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA

  # 8. Deploy frontend to Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - carddroper-frontend
      - --image=us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA
      - --region=us-west1
      - --min-instances=0
      - --max-instances=3
      - --allow-unauthenticated
      - --port=3000

options:
  logging: CLOUD_LOGGING_ONLY

images:
  - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/backend:$SHORT_SHA
  - us-west1-docker.pkg.dev/$PROJECT_ID/carddroper-repo/frontend:$SHORT_SHA
