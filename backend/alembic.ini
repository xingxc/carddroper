# Alembic configuration for carddroper.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# DATABASE_URL from .env overrides this at runtime (see alembic/env.py).
sqlalchemy.url = postgresql+asyncpg://johnxing@localhost:5432/postapp


[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
